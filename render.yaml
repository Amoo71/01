services:
  - type: web
    name: render-cloud-01
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: VNC_PASSWORD
        value: V1312
      - key: DATABASE_URL
        fromDatabase:
          name: render-cloud-db
          property: connectionString

databases:
  - name: render-cloud-db
    databaseName: rendercloud
    user: rendercloud
    plan: free
